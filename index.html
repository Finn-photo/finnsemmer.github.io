<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finn Semmer — Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111110;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--ink);
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 2.5rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    pointer-events: none;
    opacity: 0;
    animation: fadeIn 1s ease 0.8s forwards;
  }

  .nav-logo {
    font-family: 'EB Garamond', serif;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    text-decoration: none;
    color: white;
    pointer-events: all;
  }

  .nav-right {
    display: flex;
    gap: 2rem;
    pointer-events: all;
  }

  .nav-right a {
    font-size: 0.65rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-decoration: none;
    color: rgba(255,255,255,0.5);
    transition: color 0.2s;
  }
  .nav-right a:hover { color: white; }

  @keyframes fadeIn { to { opacity: 1; } }

  /* ── SPLIT ── */
  .split {
    display: flex;
    height: 100svh;
    width: 100%;
  }

  .panel {
    position: relative;
    flex: 1;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    transition: flex 0.75s cubic-bezier(0.77, 0, 0.18, 1);
    opacity: 0;
    animation: fadeIn 1.2s ease 0.15s forwards;
  }
  .panel-landscape { animation-delay: 0.25s; }

  /* Expand hovered, shrink other */
  .split:has(.panel-people:hover) .panel-people    { flex: 1.65; }
  .split:has(.panel-people:hover) .panel-landscape { flex: 0.35; }
  .split:has(.panel-landscape:hover) .panel-landscape { flex: 1.65; }
  .split:has(.panel-landscape:hover) .panel-people    { flex: 0.35; }

  /* Divider */
  .panel-people::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 1px; height: 100%;
    background: rgba(255,255,255,0.12);
    z-index: 10;
  }

  /* Background */
  .panel-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center top;
    filter: brightness(0.62);
    transform: scale(1.05);
    transition: transform 1s cubic-bezier(0.25, 0.1, 0.25, 1),
                filter 0.6s ease;
  }
  .panel:hover .panel-bg {
    transform: scale(1.0);
    filter: brightness(0.48);
  }

  .panel-people .panel-bg {
    background-image: url('https://moments-semmer.de/images/v/25-09-12_13-29_640-556.jpg');
  }
  .panel-landscape .panel-bg {
    background-image: url('https://moments-semmer.de/images/4/25-06-21_15-41_370-556.jpg');
    background-position: center center;
  }

  /* Content */
  .panel-content {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 4.5rem;
    text-align: center;
  }

  .panel-label {
    font-family: 'EB Garamond', serif;
    font-size: clamp(2rem, 3.5vw, 4rem);
    font-weight: 400;
    color: white;
    letter-spacing: 0.06em;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  .panel-sub {
    font-size: 0.58rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-top: 0.5rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.45s ease 0.06s, transform 0.45s ease 0.06s;
  }
  .panel-cta {
    margin-top: 1.8rem;
    font-size: 0.58rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    gap: 0.7rem;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.45s ease 0.1s, transform 0.45s ease 0.1s;
  }
  .panel-cta::after {
    content: '';
    display: block;
    width: 22px; height: 1px;
    background: rgba(255,255,255,0.3);
    transition: width 0.35s ease;
  }

  .panel:hover .panel-label,
  .panel:hover .panel-sub,
  .panel:hover .panel-cta {
    opacity: 1;
    transform: translateY(0);
  }
  .panel:hover .panel-cta::after { width: 36px; }

  /* ── CENTER NAME ── */
  .center-name {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 50;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    animation: fadeIn 1.4s ease 0.4s forwards;
    transition: opacity 0.4s ease;
  }

  .center-name h1 {
    font-family: 'EB Garamond', serif;
    font-size: clamp(2.8rem, 5.5vw, 7rem);
    font-weight: 400;
    color: white;
    letter-spacing: 0.07em;
    line-height: 1.0;
    white-space: nowrap;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .center-name p {
    font-size: 0.58rem;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-top: 0.7rem;
    transition: opacity 0.35s ease;
  }

  /* Fade name out on hover */
  body.hovered .center-name h1 {
    opacity: 0;
    transform: translateY(-8px);
  }
  body.hovered .center-name p { opacity: 0; }

  /* ── FOOTER ── */
  footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 2.5rem 1.6rem;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    opacity: 0;
    animation: fadeIn 1s ease 1.1s forwards;
  }
  footer a {
    font-size: 0.56rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    text-decoration: none;
    pointer-events: all;
    transition: color 0.2s;
  }
  footer a:hover { color: rgba(255,255,255,0.55); }

  /* ── MOBILE ── */
  @media (max-width: 680px) {
    html, body { overflow: auto; }
    .split { flex-direction: column; height: auto; }
    .panel { flex: none !important; height: 50svh; }
    .panel-people::after { display: none; }
    .panel-label, .panel-sub, .panel-cta { opacity: 1; transform: none; }
    .center-name { display: none; }
    footer { position: static; padding: 1.5rem 2rem; background: var(--ink); }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Finn Semmer</a>
  <div class="nav-right">
    <a href="get-to-know-me.html">About</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<div class="split" id="split">
  <a class="panel panel-people" href="people.html">
    <div class="panel-bg"></div>
    <div class="panel-content">
      <div class="panel-label">People</div>
      <div class="panel-sub">Portrait & Street</div>
      <div class="panel-cta">Explore</div>
    </div>
  </a>

  <a class="panel panel-landscape" href="landscape.html">
    <div class="panel-bg"></div>
    <div class="panel-content">
      <div class="panel-label">Landscape</div>
      <div class="panel-sub">Nature & Light</div>
      <div class="panel-cta">Explore</div>
    </div>
  </a>
</div>

<div class="center-name">
  <h1>Finn Semmer</h1>
  <p>Photography · Berlin</p>
</div>

<footer>
  <a href="impressum.html">Impressum</a>
  <a href="datenschutz.html">Datenschutz</a>
</footer>

<script>
  const panels = document.querySelectorAll('.panel');
  panels.forEach(p => {
    p.addEventListener('mouseenter', () => document.body.classList.add('hovered'));
    p.addEventListener('mouseleave', () => document.body.classList.remove('hovered'));
  });
</script>

</body>
</html>
